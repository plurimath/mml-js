name: release

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: |
          Next release version. Possible values: x.y.z, major, minor, patch (or pre|rc|etc).
          Also, you can pass 'skip' to skip 'git tag' and do 'npm publish' for the current version.
        required: true
        default: 'skip'
  repository_dispatch:
    types: [ do-release ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Opal
        run: gem install opal --no-document

      - name: Install JS deps
        run: npm install

      - name: Build
        run: node scripts/build.js
        env:
          VERSION: ${{ github.event.client_payload.version || github.event.inputs.next_version }}
          RUBY_REF: ${{ github.event.client_payload.ruby_ref || format('v{0}', github.event.inputs.next_version) }}

      - name: Smoke test (self-contained)
        run: VARIANT=self-contained node scripts/test.js

      - name: Smoke test (external)
        run: VARIANT=external node scripts/test.js

      - name: Publish to npm
        uses: metanorma/ci/.github/workflows/npm-release.yml@main
        with:
          next_version: ${{ github.event.inputs.next_version }}
        secrets:
          npm-token: ${{ secrets.PLURIMATH_CI_NPM_PUBLISH_TOKEN }}
          id-token: ${{ secrets.PLURIMATH_CI_NPM_PROVENANCE_IDENTITY }}